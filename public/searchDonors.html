<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Search Donors</title>
	<link rel="stylesheet" href="stylesheets/home.css">
</head>
<body class="insights-body">
	<main class="insights-shell">
		<header class="insights-header">
			<div>
				<p class="eyebrow">Donation Tracker</p>
				<h1>Search Donors</h1>
				<p class="intro">Find donors by name, contact details, donor type, campaign, and donation amount.</p>
			</div>
			<a class="back-link" href="index.html">Back to Home</a>
		</header>

		<section class="insights-card">
			<form id="searchForm" class="search-grid" autocomplete="off">
				<label>
					Keyword
					<input id="keyword" name="keyword" type="text" placeholder="Name, email, or phone">
				</label>

				<label>
					Donor type
					<select id="typeFilter" name="typeFilter">
						<option value="">All types</option>
					</select>
				</label>

				<label>
					Campaign
					<select id="campaignFilter" name="campaignFilter">
						<option value="">All campaigns</option>
					</select>
				</label>

				<label>
					Minimum amount
					<input id="minAmount" name="minAmount" type="number" min="0" step="0.01" placeholder="0">
				</label>

				<div class="actions">
					<button type="submit">Search</button>
					<button type="button" id="clearFilters" class="secondary">Clear</button>
				</div>
			</form>
		</section>

		<section class="insights-card" id="resultsCard">
			<div class="results-header">
				<h2>Results</h2>
				<p id="resultCount">0 matches</p>
			</div>

			<div id="emptyResults" class="empty-results" hidden>
				<p>No donors match the current filters.</p>
			</div>

			<div class="table-wrap">
				<table>
					<thead>
						<tr>
							<th>Name</th>
							<th>Email</th>
							<th>Phone</th>
							<th>Type</th>
							<th>Campaign</th>
							<th>Amount</th>
						</tr>
					</thead>
					<tbody id="resultsBody"></tbody>
				</table>
			</div>
		</section>
	</main>

	<script>
		const money = new Intl.NumberFormat("en-US", { style: "currency", currency: "USD" });

		const state = {
			rows: [],
			filteredRows: []
		};

		function toNumber(value) {
			const parsed = Number.parseFloat(value);
			return Number.isFinite(parsed) ? parsed : 0;
		}

		function text(value) {
			return String(value ?? "").trim();
		}

		function normalizeRow(row) {
			return {
				fullName: text(row.fullName ?? row.name),
				email: text(row.email),
				phone: text(row.phone ?? row.phoneNumber),
				type: text(row.donationType ?? row.frequency ?? row.type) || "Unknown",
				campaign: text(row.campaign ?? row.preferredCampaign) || "Unspecified",
				amount: toNumber(row.amount ?? row.donationAmount ?? row.giftAmount)
			};
		}

		function extractRows(data) {
			if (Array.isArray(data)) return data;
			if (data && Array.isArray(data.donors)) return data.donors;
			if (data && Array.isArray(data.records)) return data.records;
			return [];
		}

		async function loadFromJson() {
			const candidates = ["../data.json", "/data.json", "data.json"];

			for (const path of candidates) {
				try {
					const response = await fetch(path, { cache: "no-store" });
					if (!response.ok) continue;
					const parsed = await response.json();
					const rows = extractRows(parsed);
					if (rows.length > 0) return rows;
				} catch (_) {
					// Keep trying fallback locations.
				}
			}

			return [];
		}

		function loadFromLocalStorage() {
			const keys = ["donors", "donorData", "donationTrackerDonors"];
			for (const key of keys) {
				try {
					const raw = localStorage.getItem(key);
					if (!raw) continue;
					const parsed = JSON.parse(raw);
					const rows = extractRows(parsed);
					if (rows.length > 0) return rows;
				} catch (_) {
					// Ignore malformed entries.
				}
			}

			return [];
		}

		function uniqueValues(rows, key) {
			return [...new Set(rows.map((row) => row[key]).filter(Boolean))].sort((a, b) => a.localeCompare(b));
		}

		function fillSelect(id, values, placeholder) {
			const select = document.getElementById(id);
			select.innerHTML = `<option value="">${placeholder}</option>`;

			values.forEach((value) => {
				const option = document.createElement("option");
				option.value = value;
				option.textContent = value;
				select.appendChild(option);
			});
		}

		function renderRows(rows) {
			const body = document.getElementById("resultsBody");
			const count = document.getElementById("resultCount");
			const empty = document.getElementById("emptyResults");

			count.textContent = `${rows.length} match${rows.length === 1 ? "" : "es"}`;
			empty.hidden = rows.length !== 0;

			body.innerHTML = rows
				.map((row) => `
					<tr>
						<td>${row.fullName || "-"}</td>
						<td>${row.email || "-"}</td>
						<td>${row.phone || "-"}</td>
						<td>${row.type}</td>
						<td>${row.campaign}</td>
						<td>${money.format(row.amount)}</td>
					</tr>
				`)
				.join("");
		}

		function applyFilters() {
			const keyword = text(document.getElementById("keyword").value).toLowerCase();
			const typeFilter = text(document.getElementById("typeFilter").value).toLowerCase();
			const campaignFilter = text(document.getElementById("campaignFilter").value).toLowerCase();
			const minAmount = toNumber(document.getElementById("minAmount").value || 0);

			state.filteredRows = state.rows.filter((row) => {
				const searchable = `${row.fullName} ${row.email} ${row.phone}`.toLowerCase();
				const keywordMatch = keyword ? searchable.includes(keyword) : true;
				const typeMatch = typeFilter ? row.type.toLowerCase() === typeFilter : true;
				const campaignMatch = campaignFilter ? row.campaign.toLowerCase() === campaignFilter : true;
				const amountMatch = row.amount >= minAmount;

				return keywordMatch && typeMatch && campaignMatch && amountMatch;
			});

			renderRows(state.filteredRows);
		}

		function resetFilters() {
			document.getElementById("searchForm").reset();
			state.filteredRows = [...state.rows];
			renderRows(state.filteredRows);
		}

		async function initSearch() {
			const jsonRows = await loadFromJson();
			const sourceRows = jsonRows.length > 0 ? jsonRows : loadFromLocalStorage();
			state.rows = sourceRows.map(normalizeRow);
			state.filteredRows = [...state.rows];

			fillSelect("typeFilter", uniqueValues(state.rows, "type"), "All types");
			fillSelect("campaignFilter", uniqueValues(state.rows, "campaign"), "All campaigns");
			renderRows(state.filteredRows);

			document.getElementById("searchForm").addEventListener("submit", (event) => {
				event.preventDefault();
				applyFilters();
			});

			document.getElementById("clearFilters").addEventListener("click", resetFilters);
		}

		initSearch();
	</script>
</body>
</html>
